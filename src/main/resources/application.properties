# Ứng dụng JavaFX đọc cấu hình từ file .env ở thư mục chạy (thường là project root),
# qua lớp com.ocr.javafx.config.AppEnv và HibernateUtil / OpenRouterAI.
#
# Bắt buộc cho DB:
#   DB_URL=jdbc:postgresql://host:5432/database
#   DB_USER=...
#   DB_PASSWORD=...   (có thể để trống nếu DB không cần mật khẩu)
#
# Tùy chọn:
#   HIBERNATE_HBM2DDL_AUTO=update
#   HIBERNATE_SHOW_SQL=false
#   OPENROUTER_API_KEY=...   hoặc   API_KEY=...
